baseURL = "https://streetvibershop.github.io/"
languageCode = "ko-kr"
title = "streetvibershop 쇼핑 블로그"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
summaryLength = 35

[pagination]
pagerSize = 12

[outputs]
home = ["HTML", "RSS", "JSON"]

[markup]
	[markup.goldmark]
		[markup.goldmark.renderer]
			unsafe = true

[minify]
disableXML = false
minifyOutput = true

[sitemap]
changefreq = "daily"
priority = 0.7
filename = "sitemap.xml"

[permalinks]
posts = "/posts/:slug/"

[params]
defaultTheme = "auto"
disableThemeToggle = false
ShowShareButtons = true
ShowReadingTime = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowToc = true
TocOpen = false
env = "production"
description = "스트리트 패션과 힙합 문화를 선도하는 스트릿바이브 쇼핑 블로그입니다. 유니크한 스트리트웨어와 스니커즈, 액세서리를 소개합니다"
keywords = ["스트리트패션", "스니커즈", "힙합패션", "스트리트웨어", "어반스타일"]
images = ["/images/og-default.webp"]

# Search engine verification (set only when needed)
googleSiteVerification = "wYI691jLJJcCGDUHEKLHiMCiG6RGFSbe9-rfyCSjioQ"
naverSiteVerification = "fee16516129785e2282619a4c863af20c8073bb6"
bingSiteVerification = ""
yandexSiteVerification = ""

[params.homeInfoParams]
Title = "거리를 장악하는 스타일, 스트릿바이브 패션 쇼핑"
Content = "힙하고 유니크한 스트리트 패션 아이템을 한곳에서! 최신 스니커즈 드롭 정보, 한정판 스트리트웨어, 트렌디한 어반 패션 코디까지 스트릿 문화를 사랑하는 당신을 위한 쇼핑 공간입니다."

[params.fuseOpts]
isCaseSensitive = false
shouldSort = true
location = 0
distance = 1000
threshold = 0.4
minMatchCharLength = 2
keys = ["title", "permalink", "summary", "content"]

[[menu.main]]
identifier = "search"
name = "Search"
url = "/search/"
weight = 5

[[menu.main]]
identifier = "posts"
name = "Posts"
url = "/posts/"
weight = 10

[[menu.main]]
identifier = "categories"
name = "Categories"
url = "/categories/"
weight = 20

[[menu.main]]
identifier = "tags"
name = "Tags"
url = "/tags/"
weight = 30
